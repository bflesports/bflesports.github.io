<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFL ESPORTS - Roster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #8a2be2;
            border-radius: 5px;
        }
        .navbar {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(138, 43, 226, 0.3);
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
        }
        .navbar-brand img {
            width: 38px;
            height: 38px;
            object-fit: contain;
        }
        .navbar-brand span {
            background: linear-gradient(135deg, #fff, #8a2be2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-link {
            color: #fff !important;
            margin: 0 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #8a2be2, #a55eff);
            transition: width 0.3s ease;
        }
        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }
        .nav-link.active {
            color: #8a2be2 !important;
        }
        .roster-section {
            padding: 120px 20px 80px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
        }
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            background: linear-gradient(135deg, #fff, #8a2be2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .member-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(138, 43, 226, 0.2);
            margin-bottom: 30px;
        }
        .member-card:hover {
            transform: translateY(-10px);
            border-color: rgba(138, 43, 226, 0.5);
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.2);
        }
        .member-img {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
        }
        .member-img i {
            font-size: 100px;
            color: #8a2be2;
        }
        .member-info {
            padding: 1.5rem;
            text-align: center;
        }
        .member-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .member-role {
            color: #8a2be2;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .member-stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1rem 0;
            font-size: 0.9rem;
            color: #ccc;
        }
        .member-stats span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tracker-btn {
            display: inline-block;
            background: linear-gradient(135deg, #8a2be2, #a55eff);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .tracker-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
            color: white;
        }
        .search-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 3rem;
            border: 1px solid rgba(138, 43, 226, 0.3);
        }
        .search-section h3 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #8a2be2;
        }
        .search-box {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .search-box input, .search-box select {
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid rgba(138, 43, 226, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }
        .search-box input:focus, .search-box select:focus {
            outline: none;
            border-color: #8a2be2;
        }
        .search-box input {
            flex: 1;
            min-width: 200px;
        }
        .search-btn {
            background: linear-gradient(135deg, #8a2be2, #a55eff);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
        }
        .player-result {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            display: none;
        }
        .player-result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .rank-badge {
            display: inline-block;
            background: rgba(138, 43, 226, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            margin: 10px 0;
            font-weight: 600;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #8a2be2;
        }
        @media (max-width: 768px) {
            .roster-section {
                padding: 100px 15px 60px;
            }
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48Y2lyY2xlIGN4PSIyMCIgY3k9IjIwIiByPSIxOCIgZmlsbD0iIzhhMmJlMiIgc3Ryb2tlPSIjZmZmIiBzdHJva2Utd2lkdGg9IjIiLz48dGV4dCB4PSIyMCIgeT0iMjgiIGZvbnQtc2l6ZT0iMTgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiNmZmYiIGZvbnQtZmFtaWx5PSJBcmlhbCI+QjwvdGV4dD48L3N2Zz4=" alt="BFL Logo">
                <span>BFL ESPORTS</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="roster.html">Roster</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="matches.html">Matches</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="recruitment.html">Recruitment</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="roster-section">
        <div class="container">
            <h2 class="section-title">BFL ROSTER</h2>
            <div class="row" id="rosterContainer"></div>

            <div class="search-section">
                <h3><i class="fas fa-search"></i> Look Up Any Player</h3>
                <div class="search-box">
                    <input type="text" id="playerName" placeholder="Enter Ubisoft username...">
                    <select id="playerPlatform">
                        <option value="uplay">Ubisoft Connect (PC)</option>
                        <option value="psn">PlayStation</option>
                        <option value="xbl">Xbox</option>
                    </select>
                    <button class="search-btn" onclick="searchPlayer()">
                        <i class="fas fa-chart-line"></i> Get Stats
                    </button>
                </div>
                <div id="playerResult" class="player-result">
                    <h4 id="resultName"></h4>
                    <div id="resultStats"></div>
                    <a id="trackerLink" href="#" target="_blank" class="tracker-btn" style="margin-top: 15px;">
                        <i class="fas fa-external-link-alt"></i> View Full Profile on Tracker Network
                    </a>
                </div>
                <p class="text-center text-muted mt-3" style="font-size: 0.8rem;">
                    <i class="fas fa-info-circle"></i> For full stats, click the button above. (Live stats require an API key.)
                </p>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadRoster() {
            try {
                const res = await fetch('roster.json');
                const members = await res.json();
                const container = document.getElementById('rosterContainer');
                container.innerHTML = '';
                members.forEach(member => {
                    const card = document.createElement('div');
                    card.className = 'col-md-6 col-lg-4';
                    card.innerHTML = `
                        <div class="member-card">
                            <div class="member-img">
                                <i class="fas fa-user-circle"></i>
                            </div>
                            <div class="member-info">
                                <h3 class="member-name">${member.name}</h3>
                                <p class="member-role">${member.role}</p>
                                <div class="member-stats">
                                    <span><i class="fas fa-trophy"></i> ${member.rank}</span>
                                    <span><i class="fas fa-crosshairs"></i> ${member.kd} K/D</span>
                                    <span><i class="fab fa-${member.platform === 'uplay' ? 'windows' : (member.platform === 'psn' ? 'playstation' : 'xbox')}"></i> ${member.platform === 'uplay' ? 'PC' : (member.platform === 'psn' ? 'PlayStation' : 'Xbox')}</span>
                                </div>
                                <a href="https://r6.tracker.network/profile/${member.platform}/${encodeURIComponent(member.uplayName)}" target="_blank" class="tracker-btn">
                                    <i class="fas fa-chart-line"></i> View R6 Tracker Stats
                                </a>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error('Failed to load roster:', err);
                document.getElementById('rosterContainer').innerHTML = '<div class="text-center">Failed to load roster. Please try again later.</div>';
            }
        }

        function searchPlayer() {
            const playerName = document.getElementById('playerName').value.trim();
            const platform = document.getElementById('playerPlatform').value;
            if (!playerName) {
                alert('Please enter a player name');
                return;
            }
            const trackerLink = document.getElementById('trackerLink');
            trackerLink.href = `https://r6.tracker.network/profile/${platform}/${encodeURIComponent(playerName)}`;
            const resultDiv = document.getElementById('playerResult');
            document.getElementById('resultName').innerHTML = `<i class="fas fa-user"></i> ${playerName}`;
            document.getElementById('resultStats').innerHTML = `
                <p class="text-muted">Click the button below to view full stats on Tracker Network.</p>
            `;
            resultDiv.classList.add('show');
        }

        loadRoster();
    </script>
</body>
</html>
